services:
  # 2. SERVIÇO DA APLICAÇÃO (Next.js)
  web:
    build: .
    container_name: patrimonio_web
    restart: always # Se o PC reiniciar, o sistema liga sozinho
    ports:
      - "80:3000" # Mapeia a porta padrão da web (80) para a porta do Next (3000)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
 